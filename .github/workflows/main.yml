name: Python PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  run-python-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          

      - name: Run tests
        run: |
          pytest
